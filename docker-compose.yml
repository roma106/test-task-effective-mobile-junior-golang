
services:
  subscription-service:
    build: .
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy

  db:
    restart: always
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: subscription-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subscription-service"]
      interval: 5s
      timeout: 3s
      retries: 3


volumes:
  postgres_data: